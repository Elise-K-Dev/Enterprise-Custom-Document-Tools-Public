services:
  document-service:
    network_mode: host
    ports: !reset []
    networks: !reset []
    environment:
      DOCUMENT_SERVICE_HOST: 127.0.0.1
      MARKDOWN_PDF_INTERNAL_BASE_URL: http://127.0.0.1:8003

  search-service:
    network_mode: host
    ports: !reset []
    networks: !reset []
    environment:
      SEARCH_SERVICE_HOST: 127.0.0.1

  markdown-pdf-service:
    network_mode: host
    ports: !reset []
    networks: !reset []
    environment:
      MARKDOWN_PDF_SERVICE_HOST: 127.0.0.1

  web-service:
    network_mode: host
    ports: !reset []
    networks: !reset []
    environment:
      WEB_SERVICE_HOST: 127.0.0.1

  caddy:
    network_mode: host
    ports: !reset []
    networks: !reset []
